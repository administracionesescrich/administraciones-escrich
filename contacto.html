<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCRICH - Contacto Profesional</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Estilo para que el logo de WhatsApp sea pequeño y esté en la esquina */
        .whatsapp-fixed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px; /* Tamaño reducido */
            height: 45px;
            z-index: 10000;
            transition: transform 0.3s ease;
        }
        .whatsapp-fixed img {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .whatsapp-fixed:hover {
            transform: scale(1.1);
        }

        /* Ajustes adicionales para el formulario */
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            background-color: white;
        }

        .info-rapida-contacto {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: #f4f1ea;
            border-radius: 10px;
        }

        .info-rapida-contacto p {
            margin: 10px 0;
            font-size: 1.1rem;
            color: #1f4d3a;
        }
    </style>
</head>
<body>

<header>
    <img src="imagenes/logo.jpeg" class="logo" alt="Logo Escrich">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="menu">
        <a href="index.html">Inicio</a>
        <a href="empresa.html">Empresa</a>
        <a href="servicios.html">Servicios</a>
        <a href="oficinas.html">Oficinas</a>
        <a href="contacto.html">Contacto</a>
        <a href="acceso.html" style="background: #c5a059; color: white; padding: 8px 15px; border-radius: 5px; margin-left: 15px;">Acceso Clientes</a>
    </nav>
</header>

<section class="hero" data-animate>
    <img src="imagenes/frachada.png" class="hero-img">
    <div class="hero-text">
        <h2>Contacto Directo</h2>
        <p>Solicite presupuesto o consulte sus dudas sin compromiso</p>
    </div>
</section>

<section data-animate style="max-width: 800px; margin: auto; padding: 40px 20px;">
    
    <div class="info-rapida-contacto">
        <p><i class="fa-solid fa-location-dot"></i> Calle Londres, 50, Torrejón de Ardoz</p>
        <p><i class="fa-solid fa-phone"></i> <strong>656 693 708</strong></p>
        <p><i class="fa-solid fa-envelope"></i> info@escrichadministracion.com</p>
    </div>

    <h2>Envíenos su consulta</h2>
    <form action="https://formspree.io/f/tu-id" method="POST">
        <div class="form-grid">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>
        </div>
        <input type="email" name="email" placeholder="Correo electrónico" required style="margin-bottom: 20px; width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
        
        <select name="motivo" style="margin-bottom: 20px;">
            <option value="presupuesto">Solicitar Presupuesto para Comunidad</option>
            <option value="incidencia">Informar de una Incidencia</option>
            <option value="consulta">Consulta General</option>
        </select>

        <textarea name="mensaje" rows="6" placeholder="Detalle su mensaje aquí..." required style="margin-bottom: 20px; width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit;"></textarea>
        
        <button type="submit" class="btn-premium" style="width: 100%; cursor: pointer;">ENVIAR SOLICITUD PROFESIONAL</button>
    </form>
</section>

<footer>
    <p>© 2026 ESCRICH Administración de Fincas</p>
</footer>

<a href="https://wa.me/34656693708" class="whatsapp-fixed" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>

<script>
    function toggleMenu(){
        const menu = document.getElementById("menu");
        menu.classList.toggle("activo");
    }

    const elementos = document.querySelectorAll('[data-animate]');
    function mostrarScroll(){
        const trigger = window.innerHeight * 0.9;
        elementos.forEach(el => {
            const top = el.getBoundingClientRect().top;
            if(top < trigger) el.classList.add('activo');
        });
    }
    window.addEventListener('scroll', mostrarScroll);
    window.addEventListener('load', mostrarScroll);
</script>

</body>
</html>
