<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESCRICH - Acceso Clientes</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .registro-container { 
            max-width: 600px; 
            margin: 60px auto; 
            background: #fff; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border-top: 6px solid #c5a059; 
        }
        .registro-container h2 { color: #1f4d3a; margin-bottom: 10px; text-align: center; }
        .registro-container p { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 20px; }
        .form-group input, .form-group textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #c5a059;
        }

        .btn-acceso { 
            width: 100%; 
            padding: 15px; 
            background: #1f4d3a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-acceso:hover { 
            background: #c5a059; 
            transform: translateY(-2px);
        }

        .whatsapp-fixed { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 45px; 
            height: 45px; 
            z-index: 10000; 
            transition: transform 0.3s ease; 
        }
        .whatsapp-fixed img { width: 100%; height: 100%; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
        .whatsapp-fixed:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<header>
    <img src="imagenes/logo.jpeg" class="logo" alt="Logo Escrich">
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <nav id="menu">
        <a href="index.html">Inicio</a>
        <a href="empresa.html">Empresa</a>
        <a href="servicios.html">Servicios</a>
        <a href="oficinas.html">Oficinas</a>
        <a href="contacto.html">Contacto</a>
        <a href="acceso.html" style="background: #c5a059; color: white; padding: 8px 15px; border-radius: 5px; margin-left: 15px; font-weight: bold;">Acceso Clientes</a>
    </nav>
</header>

<div class="registro-container">
    <h2>Solicitud de Alta</h2>
    <p>Complete sus datos para solicitar sus claves de acceso al portal de la comunidad (Calle Londres, 50).</p>
    
    <form action="https://formspree.io/f/tu-id" method="POST">
        <div class="form-group">
            <input type="text" name="nombre" placeholder="Nombre y Apellidos" required>
        </div>
        <div class="form-group">
            <input type="text" name="comunidad" placeholder="Comunidad de Propietarios" required>
        </div>
        <div class="form-group">
            <input type="tel" name="telefono" placeholder="Teléfono" required>
        </div>
        <div class="form-group">
            <input type="email" name="email" placeholder="Correo Electrónico" required>
        </div>
        <div class="form-group">
            <textarea name="descripcion" rows="4" placeholder="Indique su portal, piso y letra..."></textarea>
        </div>
        <button type="submit" class="btn-acceso">SOLICITAR ACCESO AL PORTAL</button>
    </form>
</div>

<footer>
    <p>© 2026 ESCRICH Administración de Fincas | Calle Londres, 50</p>
</footer>

<a href="https://wa.me/34656693708" class="whatsapp-fixed" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>

<script>
    function toggleMenu(){
        const menu = document.getElementById("menu");
        menu.classList.toggle("activo");
    }
</script>

</body>
</html>
